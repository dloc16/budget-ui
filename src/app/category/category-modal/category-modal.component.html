<!------------>
<!-- Header -->
<!------------>
<ion-header>
  <ion-toolbar>
    <!-- Cancel Button -->
    <ion-buttons slot="start">
      <ion-button color="medium" (click)="cancel()">
        <ion-icon slot="start" name="close" />
        Cancel
      </ion-button>
    </ion-buttons>

    <!-- Title -->
    <ion-title>{{ category.id ? 'Edit' : 'Add' }} category</ion-title>

    <!-- Save Button -->
    <ion-buttons slot="end">
      <ion-button [disabled]="categoryForm.pristine || categoryForm.invalid" (click)="save()">
        <ion-icon slot="start" name="save" />
        Save
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<!------------->
<!-- Content -->
<!------------->
<ion-content class="ion-padding" [formGroup]="categoryForm">
  <!-- Input -->
  <ion-item>
    <ion-icon name="text" slot="start" />
    <ion-input #nameInput formControlName="name" placeholder="Name" [maxlength]="40" [required]="true" />
  </ion-item>

  <!-- Delete Button -->
  @if (category.id) {
    <ion-fab slot="fixed" vertical="bottom" horizontal="end">
      <ion-fab-button color="danger" (click)="delete()">
        <ion-icon name="trash" />
      </ion-fab-button>
    </ion-fab>
  }
</ion-content>
