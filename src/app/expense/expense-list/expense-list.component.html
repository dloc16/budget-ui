<!------------>
<!-- Header -->
<!------------>
<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button/>
    </ion-buttons>
    <ion-title>Expenses</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="addMonths(-1)">
        <ion-icon slot="icon-only" name="arrow-back"/>
      </ion-button>
      <ion-button>
        {{ date | date: 'MMMM yyyy' }}
      </ion-button>
      <ion-button (click)="addMonths(1)">
        <ion-icon slot="icon-only" name="arrow-forward"/>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<!------------->
<!-- Content -->
<!------------->
<ion-content>
  <ion-grid class="ion-padding">
    <!-- Sort, Filter & Search -->
    <ion-row>
      <ion-col size="12" size-sm="4">
        <ion-item>
          <ion-icon name="swap-vertical" slot="start"/>
          <ion-select interface="popover">
            <ion-select-option> Date (newest first) </ion-select-option>
            <ion-select-option> Date (oldest first) </ion-select-option>
            <ion-select-option> Name (A-Z) </ion-select-option>
            <ion-select-option> Name (Z-A) </ion-select-option>
          </ion-select>
        </ion-item>
      </ion-col>
      <ion-col size="12" size-sm="4">
        <ion-item>
          <ion-icon name="pricetag" slot="start"/>
          <ion-select interface="popover" placeholder="Categories" [multiple]="true" >
            <ion-select-option> Einkauf </ion-select-option>
            <ion-select-option> ÖV </ion-select-option>
            <ion-select-option> Sport </ion-select-option>
          </ion-select>
        </ion-item>
      </ion-col>
      <ion-col size="12" size-sm="4">
        <ion-item>
          <ion-icon name="search" slot="start"/>
          <ion-input placeholder="Search" [maxlength]="40" [clearInput]="true"/>
        </ion-item>
      </ion-col>
    </ion-row>

    <!-- Expense List -->
    <ion-row>
      <ion-col>
        <!-- Date Group 1 -->
        <ion-item-divider>
          <ion-label>25.04.2026</ion-label>
        </ion-item-divider>
        <ion-item [button]="true" [detail]="true">
          <ion-label>Fleisch</ion-label>
          <ion-note slot="end">
            <ion-icon name="pricetag"/>
            Einkauf
          </ion-note>
          <ion-note slot="end">CHF 500.00</ion-note>
        </ion-item>

        <!-- Date Group 2 -->
        <ion-item-divider>
          <ion-label>25.04.2026</ion-label>
        </ion-item-divider>
        <ion-item [button]="true" [detail]="true">
          <ion-label>Monatsabo</ion-label>
          <ion-note slot="end">
            <ion-icon name="pricetag"/>
            ÖV
          </ion-note>
          <ion-note slot="end">CHF 100.00</ion-note>
        </ion-item>

        <!-- Date Group 3 -->
        <ion-item-divider>
          <ion-label>25.04.2026</ion-label>
        </ion-item-divider>
        <ion-item [button]="true" [detail]="true">
          <ion-label>Tennis</ion-label>
          <ion-note slot="end">
            <ion-icon name="pricetag"/>
            Sport
          </ion-note>
          <ion-note slot="end">CHF 100.00</ion-note>
        </ion-item>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Create Button -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button>
      <ion-icon name="add"/>
    </ion-fab-button>
  </ion-fab>
</ion-content>
